name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Check next version
        id: check_version
        run: |
          NEXT_VERSION=$(bunx git-cliff --unreleased --bumped-version)
          if [ "$NEXT_VERSION" = "NO_VERSION" ]; then
            echo "No new version to release. Exiting."
            exit 0
          fi

          CURRENT_VERSION=$(git describe --tags --abbrev=0)
          if [ "$NEXT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Version $NEXT_VERSION is already released. Exiting."
            exit 0
          fi

          echo "Next version to release: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
      - name: Generate updates.xml
        run: |
          EXTENSION_VERSION=${{ steps.check_version.outputs.next_version }}
          ASSET_VERSION=$(echo "$EXTENSION_VERSION" | sed 's/^v//')

          mkdir -p ./gh-pages
          cp updates.xml ./gh-pages/updates.xml
          sed -i "s/\$ASSET_VERSION\$/${ASSET_VERSION}/g" ./gh-pages/updates.xml
          sed -i "s/\$EXTENSION_VERSION\$/${EXTENSION_VERSION}/g" ./gh-pages/updates.xml
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./gh-pages"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Build extension
        run: |
          bun run build:extension
          echo "${{ secrets.PRIVATE_KEY_B64 }}" | base64 -d > key.pem
          bunx crx3 ./youtube-auto-play/dist -p key.pem -o MusicAutoplay-Extension.crx
      - name: Generate changelog
        run: |
          bunx git-cliff --unreleased > CHANGELOG.md
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.check_version.outputs.next_version }}
          name: Release ${{ steps.check_version.outputs.next_version }}
          bodyFile: CHANGELOG.md
          artifacts: MusicAutoplay-Extension.crx
      - name: Deploy to Render
        run: |
          curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
